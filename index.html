<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crafty Mouse Gifts — Find the Perfect Gift</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<style>
:root {
  --cream:#f7f3f0;
  --blush:#f0e8e8;
  --rose:#e8d5d5;
  --teal:#3d9b8f;
  --teal-dark:#2d7a6f;
  --teal-light:#e8f5f3;
  --text-dark:#2c3440;
  --text-mid:#5a6478;
  --card-border:#ecdede;
  --white:#fff;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Jost,sans-serif;
  background:var(--cream);
  color:var(--text-dark);
  overflow-x:hidden;
}

.logo-wrap{text-align:center;padding:2rem}
.logo-wrap img{max-width:260px;background:#fff;padding:10px;border-radius:8px;border:1px solid var(--card-border)}

.hero{text-align:center;max-width:600px;margin:0 auto;padding:10px 20px}
.hero h1{font-family:"Cormorant Garamond",serif;font-size:2.5rem}
.hero p{color:var(--text-mid)}

.step-container{max-width:620px;margin:0 auto;padding:20px}

.step-panel{display:none}
.step-panel.active{display:block}

.option-list{display:flex;flex-direction:column;gap:10px}

.option-item{
  background:#fff;
  border:1px solid var(--card-border);
  padding:14px;
  border-radius:12px;
  cursor:pointer;
}

.option-item.selected{
  border-color:var(--teal);
  background:var(--teal-light);
}

.package-card{
  background:#fff;
  border:1px solid var(--card-border);
  border-radius:14px;
  margin-bottom:15px;
}

.package-body{padding:15px}

.shop-btn{
  display:block;
  text-align:center;
  background:var(--teal);
  color:#fff;
  padding:10px;
  border-radius:50px;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="logo-wrap">
<img src="https://sites.create-cdn.net/siteimages/74/7/9/747971/21/8/6/21869983/1448x1086.png">
</div>

<div class="hero">
<h1>Find the perfect gift</h1>
<p>Handmade luxury candles, wax melts, and eco-friendly decor from the Scottish Borders.</p>
</div>

<div class="step-container">

<div id="step1" class="step-panel active"></div>
<div id="step2" class="step-panel"></div>
<div id="step3" class="step-panel"></div>
<div id="step4" class="step-panel"></div>
<div id="results" class="step-panel"></div>

</div>

<script>

/* ---------------- STATE ---------------- */
const answers = {};
const stepData = [
  { id:'step1', options:['Mum','Dad','Partner','Friend','Sister','Brother','Grandma','Grandad','Colleague','Teacher','Neighbour','Treat Yourself'] },
  { id:'step2', options:["Birthday","Mother's Day","Father's Day","Christmas","Anniversary","New Home","Thank You","Get Well Soon","Valentine's Day","Just Because","Graduation","Wedding"] },
  { id:'step3', options:['Candles','Wax Melts','Home Decor','Wellness & Relaxation','Gift Set','Luxury Gift Box','Eco-Friendly','Surprise Me!'] },
  { id:'step4', options:['Under £15','£15 – £25','£25 – £40','£40 – £60','Over £60'] }
];

const budgetRanges={
'Under £15':[0,15],
'£15 – £25':[15,25],
'£25 – £40':[25,40],
'£40 – £60':[40,60],
'Over £60':[60,9999]
};

/* ---------------- PACKAGES (RESTORED CORE) ---------------- */
const PACKAGES=[
{
title:"Relaxation Box",
price:39.99,
recipients:["Mum","Friend","Partner","Sister","Grandma","Treat Yourself"],
occasions:["Birthday","Mother's Day","Get Well Soon","Just Because"],
types:["Candles","Wax Melts","Wellness & Relaxation","Gift Set"],
url:"https://www.craftymousegifts.com/"
},
{
title:"Wax Melt Treat",
price:19.99,
recipients:["Friend","Colleague","Teacher","Everyone"],
occasions:["Thank You","Birthday","Just Because"],
types:["Wax Melts","Gift Set"],
url:"https://www.craftymousegifts.com/"
}
];

/* ---------------- NAV ---------------- */
function show(step){
document.querySelectorAll('.step-panel').forEach(e=>e.classList.remove('active'));
document.getElementById(step).classList.add('active');
}

/* ---------------- SELECT ---------------- */
function select(step,val){
answers[step]=val;
if(step<4) show('step'+(step+1));
else renderResults();
}

/* ---------------- MATCH ENGINE ---------------- */
function match(){
const [min,max]=budgetRanges[answers.step4]||[0,9999];
return PACKAGES.filter(p=>{
if(p.price<min||p.price>max)return false;
return true;
});
}

/* ---------------- RESULTS ---------------- */
function renderResults(){
show('results');
const data=match();
document.getElementById('results').innerHTML=
data.map(p=>`
<div class="package-card">
<div class="package-body">
<h3>${p.title}</h3>
<p>£${p.price}</p>
<a class="shop-btn" href="${p.url}" target="_blank">View</a>
</div>
</div>
`).join('');
}

/* ---------------- BUILD UI ---------------- */
stepData.forEach((s,i)=>{
const el=document.getElementById(s.id);
const wrap=document.createElement('div');
wrap.className='option-list';

s.options.forEach(o=>{
const div=document.createElement('div');
div.className='option-item';
div.textContent=o;
div.onclick=()=>select(s.id,o);
wrap.appendChild(div);
});

el.appendChild(wrap);
});

</script>

</body>
</html>
