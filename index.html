<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crafty Mouse Gifts — Gift Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream:#f7f3f0; --blush:#f0e8e8; --rose:#e8d5d5;
    --teal:#3d9b8f; --teal-dark:#2d7a6f;
    --text:#2c3440; --muted:#5a6478;
    --white:#fff;
  }
  body{font-family:Jost,sans-serif;background:var(--cream);color:var(--text);}
  .wrap{max-width:720px;margin:0 auto;padding:24px;}
  h1{font-family:Cormorant Garamond,serif;font-weight:400;text-align:center;margin-bottom:8px;}
  p{color:var(--muted);text-align:center;margin-bottom:24px;}

  .panel{background:var(--white);border:1px solid var(--rose);border-radius:16px;padding:16px;margin-bottom:16px;}

  label{font-size:0.9rem;color:var(--muted);display:block;margin-bottom:6px;}
  select,input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--rose);font-size:1rem;}

  .btn{background:var(--teal);color:#fff;border:none;padding:12px 16px;border-radius:50px;cursor:pointer;width:100%;margin-top:12px;}
  .btn:disabled{background:#ccc;cursor:not-allowed;}

  .results{margin-top:20px;}
  .card{border:1px solid var(--rose);border-radius:14px;padding:14px;margin-bottom:12px;background:#fff;}
  .title{font-family:Cormorant Garamond,serif;font-size:1.3rem;}
  .price{font-weight:500;color:var(--teal);}
  .small{font-size:0.85rem;color:var(--muted);margin-top:6px;}
  a{color:var(--teal);text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">

<h1>Find Your Perfect Gift</h1>
<p>Answer a few simple questions — no page jumping, everything updates instantly.</p>

<div class="panel">
  <label>Who is the gift for?</label>
  <select id="recipient">
    <option value="">Select...</option>
    <option>Mum</option><option>Dad</option><option>Partner</option><option>Friend</option><option>Sister</option><option>Brother</option><option>Grandma</option><option>Grandad</option><option>Colleague</option><option>Teacher</option><option>Neighbour</option><option>Treat Yourself</option>
  </select>
</div>

<div class="panel">
  <label>Occasion</label>
  <select id="occasion">
    <option value="">Select...</option>
    <option>Birthday</option><option>Mother's Day</option><option>Father's Day</option><option>Christmas</option><option>Anniversary</option><option>New Home</option><option>Thank You</option><option>Get Well Soon</option><option>Valentine's Day</option><option>Just Because</option><option>Graduation</option><option>Wedding</option>
  </select>
</div>

<div class="panel">
  <label>Gift type</label>
  <select id="type">
    <option value="">Select...</option>
    <option>Candles</option><option>Wax Melts</option><option>Home Decor</option><option>Wellness & Relaxation</option><option>Gift Set</option><option>Luxury Gift Box</option><option>Eco-Friendly</option><option>Surprise Me</option>
  </select>
</div>

<div class="panel">
  <label>Budget</label>
  <select id="budget">
    <option value="any">No limit / Any budget</option>
    <option value="15">Under £15</option>
    <option value="25">£15 - £25</option>
    <option value="40">£25 - £40</option>
    <option value="60">£40 - £60</option>
    <option value="999">Over £60</option>
  </select>
</div>

<button class="btn" onclick="run()">Find Gifts</button>

<div class="results" id="results"></div>

</div>

<script>
const PACKAGES = [
  {title:"Relaxation Box", price:39.99, desc:"Lavender candle + melts + warmer", url:"https://www.craftymousegifts.com"},
  {title:"Candle Lover's Collection", price:36.99, desc:"Three soy candles", url:"https://www.craftymousegifts.com"},
  {title:"Wax Melt Treat", price:19.99, desc:"6 wax melt bars", url:"https://www.craftymousegifts.com"},
  {title:"Luxury Home Spa", price:47.99, desc:"Candle + diffuser + flowers", url:"https://www.craftymousegifts.com"}
];

function run(){
  const budget = document.getElementById('budget').value;
  const max = budget === 'any' ? 9999 : parseFloat(budget);

  const results = PACKAGES.filter(p => p.price <= max);

  const html = results.map(p => `
    <div class="card">
      <div class="title">${p.title}</div>
      <div class="price">£${p.price.toFixed(2)}</div>
      <div class="small">${p.desc}</div>
      <a href="${p.url}" target="_blank">View product</a>
    </div>
  `).join('');

  document.getElementById('results').innerHTML = html || '<p>No matches found</p>';
}
</script>

</body>
</html>
