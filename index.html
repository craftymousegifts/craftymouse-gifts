<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crafty Mouse Gifts — Find the Perfect Gift</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #f7f3f0; --blush: #f0e8e8; --rose: #e8d5d5;
    --teal: #3d9b8f; --teal-dark: #2d7a6f; --teal-light: #e8f5f3;
    --text-dark: #2c3440; --text-mid: #5a6478; --text-light: #8a93a8;
    --white: #ffffff; --card-border: #ecdede;
  }
  html { scroll-behavior: auto; }
  body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text-dark); min-height: 100vh; }
  .logo-wrap { text-align: center; padding: 2.5rem 1rem 1rem; }
  .logo-wrap img { max-width: 280px; width: 90%; border: 1px solid var(--card-border); border-radius: 8px; padding: 0.75rem 1.5rem; background: white; }
  .hero { text-align: center; padding: 1.5rem 1.5rem 0.5rem; max-width: 620px; margin: 0 auto; }
  .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 6vw, 3rem); font-weight: 400; color: var(--text-dark); line-height: 1.2; margin-bottom: 0.75rem; }
  .hero p { font-size: 1rem; color: var(--text-mid); line-height: 1.7; font-weight: 300; }
  .step-container { max-width: 620px; margin: 0 auto; padding: 1.5rem 1.25rem 4rem; }
  .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
  .step-left { display: flex; align-items: center; gap: 0.75rem; }
  .back-btn { background: none; border: 1.5px solid var(--card-border); border-radius: 50%; width: 34px; height: 34px; cursor: pointer; font-size: 1rem; color: var(--text-mid); display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .back-btn:hover { border-color: var(--teal); color: var(--teal); }
  .step-label { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-light); font-weight: 500; }
  .step-dots { display: flex; gap: 6px; }
  .dot { width: 28px; height: 5px; border-radius: 3px; background: var(--rose); transition: background 0.3s; }
  .dot.active { background: var(--teal); }
  .dot.done { background: var(--teal); opacity: 0.5; }
  .step-icon { width: 56px; height: 56px; border-radius: 50%; background: var(--blush); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 1.5rem; }
  .step-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.6rem, 5vw, 2.2rem); font-weight: 400; text-align: center; margin-bottom: 0.4rem; color: var(--text-dark); }
  .step-subtitle { text-align: center; color: var(--text-mid); font-size: 0.95rem; margin-bottom: 1.75rem; font-weight: 300; }
  .option-list { display: flex; flex-direction: column; gap: 10px; }
  .option-item { background: var(--white); border: 1.5px solid var(--card-border); border-radius: 14px; padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.2s; font-size: 1rem; color: var(--text-dark); font-weight: 400; }
  .option-item:hover { border-color: var(--teal); background: var(--teal-light); }
  .option-item.selected { border-color: var(--teal); background: var(--teal-light); }
  .option-radio { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--rose); background: white; flex-shrink: 0; transition: all 0.2s; position: relative; }
  .option-item.selected .option-radio { border-color: var(--teal); background: var(--teal); }
  .option-item.selected .option-radio::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 8px; height: 8px; border-radius: 50%; background: white; }

  .results-cards { display:flex; flex-direction:column; gap:1rem; }
  .package-card { background:#fff; border:1px solid var(--card-border); border-radius:16px; overflow:hidden; }
  .package-body { padding:1rem; }
  .package-name { font-family:'Cormorant Garamond', serif; font-size:1.4rem; }
  .package-price { font-weight:500; color:var(--teal); }
  .shop-btn { display:block; margin-top:10px; text-align:center; padding:10px; background:var(--teal); color:#fff; border-radius:50px; text-decoration:none; }

  .hidden { display:none !important; }
</style>
</head>
<body>

<div class="logo-wrap">
  <img src="https://sites.create-cdn.net/siteimages/74/7/9/747971/21/8/6/21869983/1448x1086.png">
</div>

<div class="hero">
  <h1>Find the perfect gift</h1>
  <p>Handmade luxury candles, wax melts, and eco-friendly decor from the Scottish Borders.</p>
</div>

<div class="step-container">

  <div id="step1" class="step-panel">
    <div class="step-icon">🤍</div>
    <div class="step-title">Who is the gift for?</div>
    <div class="option-list" id="list1"></div>
  </div>

  <div id="step2" class="step-panel hidden">
    <div class="step-icon">🎉</div>
    <div class="step-title">What's the occasion?</div>
    <div class="option-list" id="list2"></div>
  </div>

  <div id="step3" class="step-panel hidden">
    <div class="step-icon">🎁</div>
    <div class="step-title">What kind of gift?</div>
    <div class="option-list" id="list3"></div>
  </div>

  <div id="step4" class="step-panel hidden">
    <div class="step-icon">💰</div>
    <div class="step-title">What's your budget?</div>
    <div class="option-list" id="list4"></div>
  </div>

  <div id="results" class="step-panel hidden">
    <div class="step-icon">🎀</div>
    <div class="step-title">Your Matches</div>
    <div id="package-cards" class="results-cards">Loading results...</div>
  </div>

</div>

<script>
const stepData = [
  { id:'list1', options:['Mum','Dad','Partner','Friend','Sister','Brother','Grandma','Grandad','Colleague','Teacher','Neighbour','Treat Yourself'] },
  { id:'list2', options:["Birthday","Mother's Day","Father's Day","Christmas","Anniversary","New Home","Thank You","Get Well Soon","Valentine's Day","Just Because","Graduation","Wedding"] },
  { id:'list3', options:['Candles','Wax Melts','Home Decor','Wellness & Relaxation','Gift Set','Luxury Gift Box','Eco-Friendly','Surprise Me!'] },
  { id:'list4', options:['Under £15','£15 – £25','£25 – £40','£40 – £60','Over £60'] }
];

const answers = {};
const budgetRanges = {
  'Under £15':[0,15], '£15 – £25':[15,25], '£25 – £40':[25,40], '£40 – £60':[40,60], 'Over £60':[60,9999]
};

function showStep(n){
  document.querySelectorAll('.step-panel').forEach(s=>s.classList.add('hidden'));
  document.getElementById('step'+n).classList.remove('hidden');
}

function select(step,val){
  answers['step'+step]=val;
  if(step<4) showStep(step+1);
  else show();
}

function show(){
  showStep('results');
  document.getElementById('package-cards').innerHTML='Results loaded';
}

function render(){
  stepData.forEach((s,i)=>{
    const el=document.getElementById(s.id);
    s.options.forEach(opt=>{
      const div=document.createElement('div');
      div.className='option-item';
      div.innerHTML=`<span>${opt}</span>`;
      div.onclick=()=>select(i+1,opt);
      el.appendChild(div);
    });
  });
}

render();
</script>

</body>
</html>
