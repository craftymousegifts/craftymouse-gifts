<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ideas">
<title>Michaela's Ideas</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --cmg:#9333EA;
  --clp:#0D9488;
  --design:#F59E0B;
  --bg:#0F1117;
  --card:#1A1D26;
  --border:#2A2D3A;
  --text:#F1F5F9;
  --muted:#64748B;
  --radius:16px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,'SF Pro Display',sans-serif;-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
.header{
  padding:env(safe-area-inset-top,20px) 20px 0;
  padding-top:calc(env(safe-area-inset-top,20px) + 12px);
  display:flex;align-items:center;justify-content:space-between;
}
.header h1{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-0.5px;}
.header-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.clear-btn{font-size:12px;color:var(--muted);background:var(--card);border:1px solid var(--border);padding:6px 12px;border-radius:20px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.clear-btn:active{opacity:0.6;}

/* ── TABS ── */
.tabs{display:flex;gap:8px;padding:16px 20px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);color:var(--muted);background:var(--card);transition:all 0.15s;-webkit-tap-highlight-color:transparent;}
.tab.active-cmg{background:var(--cmg);border-color:var(--cmg);color:white;}
.tab.active-clp{background:var(--clp);border-color:var(--clp);color:white;}
.tab.active-design{background:var(--design);border-color:var(--design);color:#111;}
.tab:active{transform:scale(0.95);}

/* ── MAIN AREA ── */
.main{
  display:flex;flex-direction:column;
  height:calc(100vh - 130px);
  padding:0 16px;
  padding-bottom:env(safe-area-inset-bottom,20px);
}

/* ── INPUT AREA ── */
.input-wrap{
  display:flex;gap:10px;align-items:flex-end;
  margin-bottom:14px;
}
.idea-input{
  flex:1;
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:14px;
  padding:14px 16px;
  font-size:15px;
  color:var(--text);
  resize:none;
  min-height:56px;
  max-height:140px;
  font-family:inherit;
  line-height:1.5;
  outline:none;
  -webkit-appearance:none;
  transition:border-color 0.2s;
}
.idea-input::placeholder{color:var(--muted);}
.idea-input:focus{border-color:var(--active-col,var(--clp));}
.add-btn{
  width:48px;height:48px;border-radius:14px;border:none;
  background:var(--active-col,var(--clp));
  color:white;font-size:22px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  transition:all 0.15s;
}
.add-btn:active{transform:scale(0.9);opacity:0.8;}

/* ── IDEAS LIST ── */
.ideas-list{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:flex;flex-direction:column;gap:10px;
  padding-bottom:20px;
}
.ideas-list::-webkit-scrollbar{display:none;}

.idea-item{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:14px 16px;
  display:flex;gap:12px;align-items:flex-start;
  animation:slideIn 0.2s ease;
}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

.idea-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--active-col,var(--clp));
  flex-shrink:0;margin-top:6px;
}
.idea-body{flex:1;}
.idea-text{font-size:14px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-word;}
.idea-meta{font-size:11px;color:var(--muted);margin-top:6px;}
.idea-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.del-btn{
  width:30px;height:30px;border-radius:8px;border:none;
  background:transparent;color:var(--muted);font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
}
.del-btn:active{background:rgba(239,68,68,0.15);color:#ef4444;}

.empty{
  text-align:center;padding:48px 24px;
  color:var(--muted);font-size:14px;line-height:1.8;
}
.empty-icon{font-size:40px;margin-bottom:12px;}

/* ── COUNT BADGE ── */
.count{
  display:inline-block;background:rgba(255,255,255,0.1);
  color:var(--muted);font-size:11px;font-weight:600;
  padding:2px 7px;border-radius:20px;margin-left:6px;
}

/* ── COLOURS per section ── */
body[data-tab="cmg"]{--active-col:var(--cmg);}
body[data-tab="clp"]{--active-col:var(--clp);}
body[data-tab="design"]{--active-col:var(--design);}
</style>
</head>
<body data-tab="clp">

<div class="header">
  <div>
    <div class="header h1" style="font-size:20px;font-weight:700;color:#F1F5F9;letter-spacing:-0.5px;">💡 Ideas</div>
    <div class="header-sub">Tap a category · Type · Add</div>
  </div>
  <button class="clear-btn" onclick="clearCurrent()">Clear all</button>
</div>

<div class="tabs">
  <button class="tab" id="tab-cmg" onclick="switchTab('cmg')">
    🎨 Crafty Mouse <span class="count" id="count-cmg">0</span>
  </button>
  <button class="tab active-clp" id="tab-clp" onclick="switchTab('clp')">
    🏷️ CLPeasy <span class="count" id="count-clp">0</span>
  </button>
  <button class="tab" id="tab-design" onclick="switchTab('design')">
    ✏️ CLPeasy Design <span class="count" id="count-design">0</span>
  </button>
</div>

<div class="main">
  <div class="input-wrap">
    <textarea class="idea-input" id="idea-input"
      placeholder="Brain dump here..."
      rows="1"
      onInput="autoResize(this)"
      onKeydown="handleKey(event)"></textarea>
    <button class="add-btn" id="add-btn" onclick="addIdea()">+</button>
  </div>
  <div class="ideas-list" id="ideas-list"></div>
</div>

<script>
const TABS = ['cmg','clp','design'];
let current = 'clp';

// Load all data
let data = {};
TABS.forEach(t => {
  try { data[t] = JSON.parse(localStorage.getItem('ideas_'+t)) || []; }
  catch { data[t] = []; }
});

// Seed initial ideas from Michaela's session
function seedIfEmpty(tab, ideas) {
  if (data[tab].length === 0) {
    ideas.forEach(text => {
      data[tab].unshift({ id: Date.now() + Math.random(), text, ts: new Date().toISOString() });
    });
    save(tab);
  }
}

seedIfEmpty('clp', [
  'AI vs Human race — being a maker is even more reason to look professional and be compliant. CLP labels and label designs is the tool to help makers stay above in the struggle to have an income.',
]);

seedIfEmpty('design', [
  'Pre-built templates for round, oval, rectangular labels in common maker sizes.',
  'Brand colour picker and font selector.',
  'Upload your own logo.',
  'Product name, scent name, weight, batch number fields.',
  'Export in same formats as CLPeasy — PNG, Print Shop PDF, Cricut zip.',
  'Pairs with the CLP back label so both download together as a set.',
  'Could be a higher tier — Easy Pro+ or Easy Creative — or a separate monthly add-on.',
  'Keep within CLPeasy (clpeasy.com/design) rather than a new domain — one login, complete labelling solution.',
]);

function save(tab) {
  localStorage.setItem('ideas_'+tab, JSON.stringify(data[tab]));
}

function switchTab(tab) {
  current = tab;
  document.body.setAttribute('data-tab', tab);
  TABS.forEach(t => {
    const el = document.getElementById('tab-'+t);
    el.className = 'tab';
    if (t === tab) el.classList.add('active-'+t);
  });
  const placeholders = {
    cmg: 'Crafty Mouse Gifts idea...',
    clp: 'CLPeasy idea...',
    design: 'CLPeasy Design idea...'
  };
  document.getElementById('idea-input').placeholder = placeholders[tab];
  document.getElementById('idea-input').value = '';
  autoResize(document.getElementById('idea-input'));
  render();
}

function addIdea() {
  const input = document.getElementById('idea-input');
  const text = input.value.trim();
  if (!text) return;
  data[current].unshift({ id: Date.now(), text, ts: new Date().toISOString() });
  save(current);
  input.value = '';
  autoResize(input);
  render();
  input.focus();
}

function deleteIdea(id) {
  data[current] = data[current].filter(i => i.id !== id);
  save(current);
  render();
}

function clearCurrent() {
  if (data[current].length === 0) return;
  if (confirm('Clear all ' + current.toUpperCase() + ' ideas?')) {
    data[current] = [];
    save(current);
    render();
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    addIdea();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}

function render() {
  const list = document.getElementById('ideas-list');
  const ideas = data[current];

  // Update counts
  TABS.forEach(t => {
    document.getElementById('count-'+t).textContent = data[t].length;
  });

  if (ideas.length === 0) {
    const labels = { cmg:'Crafty Mouse Gifts', clp:'CLPeasy', design:'CLPeasy Design' };
    list.innerHTML = `<div class="empty"><div class="empty-icon">💡</div>No ${labels[current]} ideas yet.<br>Type something above and tap +</div>`;
    return;
  }

  list.innerHTML = ideas.map(idea => `
    <div class="idea-item" id="item-${idea.id}">
      <div class="idea-dot"></div>
      <div class="idea-body">
        <div class="idea-text">${escHtml(idea.text)}</div>
        <div class="idea-meta">${formatDate(idea.ts)}</div>
      </div>
      <div class="idea-actions">
        <button class="del-btn" onclick="deleteIdea(${idea.id})" title="Delete">×</button>
      </div>
    </div>
  `).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
switchTab('clp');
</script>
</body>
</html>
